<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Escolar Pro | Phythecreator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #4f46e5;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; color: var(--primary); margin-bottom: 5px; }

        /* Gráficos */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }

        .chart-box {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        /* Grid de Disciplinas */
        .disciplinas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-sub); }
        
        input, select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            width: 70px;
        }

        .tests-container {
            background: var(--bg);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .test-inputs { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }

        .result-area {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed var(--bg);
        }

        .nivel-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .reasoning {
            font-size: 0.8rem;
            line-height: 1.4;
            color: var(--text-sub);
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
        }

        .btn-update {
            display: block; width: 250px; margin: 40px auto;
            padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: bold;
            cursor: pointer; font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Dashboard Académico</h1>
    <p>Escala Portuguesa (1 a 5) • Phythecreator</p>
</div>

<div class="charts-row">
    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="lineChart"></canvas>
    </div>
</div>

<div id="grid" class="disciplinas-grid"></div>

<button class="btn-update" onclick="atualizarDashboard()">ATUALIZAR TUDO 📈</button>

<script>
    const disciplinas = ["História", "Português", "Geografia", "Francês", "Inglês", "Matemática", "Físico-Química", "Ciências", "Educação Física"];
    
    function renderCards() {
        const grid = document.getElementById('grid');
        disciplinas.forEach((d, i) => {
            grid.innerHTML += `
                <div class="card">
                    <h3>${d}</h3>
                    
                    <div class="input-row">
                        <label>Nº de Testes:</label>
                        <select id="num-t-${i}" onchange="gerarInputsTestes(${i})">
                            <option value="2">2 Testes</option>
                            <option value="3" selected>3 Testes</option>
                            <option value="4">4 Testes</option>
                        </select>
                    </div>

                    <div class="tests-container">
                        <label>Notas dos Testes (0-100):</label>
                        <div id="test-inputs-${i}" class="test-inputs"></div>
                    </div>

                    <div class="input-row">
                        <label>Atitudes (20%):</label>
                        <input type="number" id="at-${i}" value="0" min="0" max="100">
                    </div>

                    <div class="input-row">
                        <label>Questão-Aula/Trabalhos (20%):</label>
                        <input type="number" id="tr-${i}" value="0" min="0" max="100">
                    </div>

                    <div class="input-row" style="margin-top:15px; color: var(--primary)">
                        <label>Tua Autoavaliação (1-5):</label>
                        <input type="number" id="auto-${i}" value="3" min="1" max="5">
                    </div>

                    <div class="result-area" id="res-${i}">
                        <div class="nivel-badge" id="badge-${i}">Nível -</div>
                        <div class="reasoning" id="reason-${i}">Preenche os dados para ver a análise.</div>
                    </div>
                </div>
            `;
            gerarInputsTestes(i);
        });
    }

    function gerarInputsTestes(index) {
        const num = document.getElementById(`num-t-${index}`).value;
        const container = document.getElementById(`test-inputs-${index}`);
        container.innerHTML = "";
        for(let j=1; j<=num; j++) {
            container.innerHTML += `<input type="number" class="t-input-${index}" placeholder="T${j}" value="0">`;
        }
    }

    let barChart, lineChart;

    function atualizarDashboard() {
        const labels = disciplinas;
        const valoresNiveis = [];

        disciplinas.forEach((_, i) => {
            const testes = Array.from(document.getElementsByClassName(`t-input-${i}`)).map(input => Number(input.value));
            const mediaTestes = testes.reduce((a,b) => a+b, 0) / testes.length;
            const atitudes = Number(document.getElementById(`at-${i}`).value);
            const trabalhos = Number(document.getElementById(`tr-${i}`).value);
            const auto = Number(document.getElementById(`auto-${i}`).value);

            const finalPercent = (mediaTestes * 0.6) + (atitudes * 0.2) + (trabalhos * 0.2);
            
            let nivel = 1;
            if(finalPercent >= 90) nivel = 5;
            else if(finalPercent >= 70) nivel = 4;
            else if(finalPercent >= 50) nivel = 3;
            else if(finalPercent >= 20) nivel = 2;

            valoresNiveis.push(nivel);

            // Atualizar UI do Card
            const badge = document.getElementById(`badge-${i}`);
            badge.innerText = `Nível ${nivel}`;
            badge.style.background = nivel >= 4 ? '#d1fae5' : (nivel === 3 ? '#fef3c7' : '#fee2e2');
            badge.style.color = nivel >= 4 ? 'var(--success)' : (nivel === 3 ? 'var(--warning)' : 'var(--danger)');

            // Raciocínio
            const reason = document.getElementById(`reason-${i}`);
            let text = "";
            if (nivel === auto) {
                text = `**Concordo.** A tua média de ${finalPercent.toFixed(0)}% valida o nível ${nivel}. Mantém o equilíbrio entre testes e atitudes.`;
            } else if (nivel > auto) {
                text = `**Discordo (Estás Melhor).** Tu avaliaste-te com ${auto}, mas os teus resultados (${finalPercent.toFixed(0)}%) já te colocam no nível ${nivel}. Confia mais no teu trabalho!`;
            } else {
                text = `**Discordo (Atenção).** Queres o nível ${auto}, mas a tua média atual é ${finalPercent.toFixed(0)}%. `;
                if(mediaTestes < 50) text += "O peso dos testes (60%) está a baixar a nota. ";
                if(atitudes < 70) text += "Melhorar as atitudes pode ajudar a subir.";
            }
            reason.innerText = text;
        });

        updateCharts(labels, valoresNiveis);
    }

    function updateCharts(labels, data) {
        const commonOptions = {
            responsive: true,
            scales: { y: { min: 0, max: 5, ticks: { stepSize: 1 } } },
            plugins: { legend: { display: false } }
        };

        if(barChart) barChart.destroy();
        if(lineChart) lineChart.destroy();

        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Nível', data, backgroundColor: '#4f46e5' }] },
            options: { ...commonOptions, plugins: { title: { display: true, text: 'Níveis por Disciplina (Barras)' } } }
        });

        lineChart = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: { labels, datasets: [{ label: 'Progressão', data, borderColor: '#10b981', tension: 0.3, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' }] },
            options: { ...commonOptions, plugins: { title: { display: true, text: 'Tendência Académica (Linhas)' } } }
        });
    }

    renderCards();
    atualizarDashboard();
</script>

</body>
</html>
