<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Escolar | Phythecreator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .chart-container {
            grid-column: 1 / -1;
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        /* Subject Cards */
        .subject-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--accent);
            transition: transform 0.2s;
        }

        .subject-card:hover { transform: translateY(-5px); }
        .subject-card h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 10px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .row { display: flex; gap: 10px; align-items: center; }
        
        label { font-size: 0.85rem; color: #94a3b8; }
        input { 
            background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 8px; border-radius: 6px; width: 60px; text-align: center;
        }

        .tests-area { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }

        .final-score {
            font-size: 1.2rem; font-weight: 600; text-align: center;
            padding: 10px; border-radius: 8px; margin-top: 10px;
        }

        .verdict { font-size: 0.8rem; margin-top: 5px; text-align: center; font-style: italic; }

        button.update-btn {
            position: fixed; bottom: 30px; right: 30px;
            padding: 15px 30px; background: var(--accent); color: var(--bg);
            border: none; border-radius: 50px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>MEU DASHBOARD ESCOLAR</h1>
    <p>Acompanhamento de Notas e Desempenho</p>
</div>

<div class="dashboard-grid">
    <div class="chart-container">
        <canvas id="mainChart" height="100"></canvas>
    </div>

    <div id="disciplinas-grid" style="display: contents;"></div>
</div>

<button class="update-btn" onclick="atualizarTudo()">ATUALIZAR GRÁFICO 🚀</button>

<script>
    const disciplinas = [
        "História", "Português", "Geografia", "Francês", "Inglês", 
        "Matemática", "Físico-Química", "Ciências", "Educação Física"
    ];

    // Criar os Cards no HTML
    const grid = document.getElementById('disciplinas-grid');
    disciplinas.forEach((disc, index) => {
        grid.innerHTML += `
            <div class="subject-card">
                <h3>${disc}</h3>
                <div class="input-group">
                    <div class="tests-area">
                        <label>Notas dos Testes (0-100):</label>
                        <div class="row">
                            <input type="number" class="t1-${index}" placeholder="T1" min="0" max="100">
                            <input type="number" class="t2-${index}" placeholder="T2" min="0" max="100">
                            <input type="number" class="t3-${index}" placeholder="T3" min="0" max="100">
                        </div>
                    </div>
                    <div class="row">
                        <label>Atitudes (20%):</label>
                        <input type="number" class="at-${index}" placeholder="0-100" min="0" max="100">
                    </div>
                    <div class="row">
                        <label>Trabalhos (20%):</label>
                        <input type="number" class="tr-${index}" placeholder="0-100" min="0" max="100">
                    </div>
                    <div class="row" style="background: rgba(56, 189, 248, 0.1); padding: 5px; border-radius: 5px;">
                        <label>Tua Autoavaliação (1-5):</label>
                        <input type="number" class="auto-${index}" placeholder="1-5" min="1" max="5">
                    </div>
                </div>
                <div id="final-${index}" class="final-score">Nível: -</div>
                <div id="verdict-${index}" class="verdict"></div>
            </div>
        `;
    });

    let myChart;

    function calcularNota(index) {
        const t1 = Number(document.querySelector(`.t1-${index}`).value) || 0;
        const t2 = Number(document.querySelector(`.t2-${index}`).value) || 0;
        const t3 = Number(document.querySelector(`.t3-${index}`).value) || 0;
        const at = Number(document.querySelector(`.at-${index}`).value) || 0;
        const tr = Number(document.querySelector(`.tr-${index}`).value) || 0;
        const auto = Number(document.querySelector(`.auto-${index}`).value) || 0;

        // Média dos testes (apenas os preenchidos)
        let testesValidos = [t1, t2, t3].filter(v => v > 0);
        let mediaTestes = testesValidos.length > 0 ? (testesValidos.reduce((a,b) => a+b) / testesValidos.length) : 0;

        // Cálculo Final
        let finalPercent = (mediaTestes * 0.6) + (at * 0.2) + (tr * 0.2);
        
        // Conversão para escala 1-5
        let nivel = 1;
        if(finalPercent >= 90) nivel = 5;
        else if(finalPercent >= 70) nivel = 4;
        else if(finalPercent >= 50) nivel = 3;
        else if(finalPercent >= 20) nivel = 2;

        // UI Update
        const display = document.getElementById(`final-${index}`);
        display.innerHTML = `Nível ${nivel} (${finalPercent.toFixed(0)}%)`;
        
        // Cores baseadas na nota
        if(nivel >= 4) display.style.color = 'var(--success)';
        else if(nivel == 3) display.style.color = 'var(--warning)';
        else display.style.color = 'var(--danger)';

        // Veredito
        const verdict = document.getElementById(`verdict-${index}`);
        if(auto > 0) {
            if(auto === nivel) verdict.innerText = "✓ O sistema concorda contigo.";
            else if(nivel > auto) verdict.innerText = "↑ Estás melhor do que pensas!";
            else verdict.innerText = "↓ Precisas de focar mais.";
        }

        return nivel;
    }

    function atualizarTudo() {
        const dadosNiveis = disciplinas.map((_, i) => calcularNota(i));

        // Atualizar Gráfico
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: disciplinas,
                datasets: [{
                    label: 'Nível por Disciplina (1-5)',
                    data: dadosNiveis,
                    backgroundColor: 'rgba(56, 189, 248, 0.6)',
                    borderColor: '#38bdf8',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { min: 0, max: 5, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { ticks: { color: '#94a3b8' } }
                },
                plugins: {
                    legend: { labels: { color: 'white', font: { weight: 'bold' } } }
                }
            }
        });
    }

    // Inicializar gráfico vazio
    window.onload = atualizarTudo;
</script>

</body>
</html>
