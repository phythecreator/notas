<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Notas - Meu Painel Escolar</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); }
        
        .setup-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; padding: 15px; border-bottom: 2px solid #eee; }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        .grades-grid { display: none; margin-top: 20px; }
        .visible { display: block; }

        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #357abd; }

        .result-box { margin-top: 30px; padding: 20px; border-radius: 10px; text-align: center; display: none; }
        .agree { background: #d4edda; color: #155724; }
        .disagree { background: #f8d7da; color: #721c24; }

        .info-tag { font-size: 0.8em; color: #666; margin-top: -10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Calculadora de Notas</h1>
    
    <div class="setup-section">
        <div>
            <label>Disciplina:</label>
            <select id="disciplina">
                <option value="História">História</option>
                <option value="Português">Português</option>
                <option value="Geografia">Geografia</option>
                <option value="Francês">Francês</option>
                <option value="Inglês">Inglês</option>
                <option value="Matemática">Matemática</option>
                <option value="Físico-Química">Físico-Química</option>
                <option value="Ciências">Ciências</option>
                <option value="Educação Física">Educação Física</option>
            </select>
        </div>
        <div>
            <label>Número de Testes:</label>
            <select id="numTestes" onchange="gerarInputsTestes()">
                <option value="2">2 Testes</option>
                <option value="3">3 Testes</option>
                <option value="4">4 Testes</option>
            </select>
        </div>
    </div>

    <div id="testesContainer">
        </div>

    <div class="visible">
        <label>Atitudes e Valores (20%):</label>
        <input type="number" id="atitudes" placeholder="0-100" min="0" max="100">
        
        <label>Questões-aula / Trabalhos (20%):</label>
        <input type="number" id="outros" placeholder="0-100" min="0" max="100">
        
        <hr>
        
        <label>Tua Autoavaliação (1 a 5):</label>
        <input type="number" id="autoAval" placeholder="Qual nota achas que mereces?" min="1" max="5">
        
        <button onclick="calcularResultado()">Calcular Veredito</button>
    </div>

    <div id="resultado" class="result-box">
        </div>
</div>

<script>
    function gerarInputsTestes() {
        const num = document.getElementById('numTestes').value;
        const container = document.getElementById('testesContainer');
        container.innerHTML = `<p class="info-tag">Média dos testes vale 60% da nota final.</p>`;
        
        for(let i = 1; i <= num; i++) {
            container.innerHTML += `
                <label>Nota do Teste ${i} (0-100):</label>
                <input type="number" class="nota-teste" placeholder="Ex: 75" min="0" max="100">
            `;
        }
    }

    function converterParaEscala(percentagem) {
        if (percentagem >= 90) return 5;
        if (percentagem >= 70) return 4;
        if (percentagem >= 50) return 3;
        if (percentagem >= 20) return 2;
        return 1;
    }

    function calcularResultado() {
        // Obter notas dos testes
        const testes = document.getElementsByClassName('nota-teste');
        let somaTestes = 0;
        for(let t of testes) {
            somaTestes += Number(t.value);
        }
        const mediaTestes = somaTestes / testes.length;

        // Obter outros valores
        const atitudes = Number(document.getElementById('atitudes').value);
        const outros = Number(document.getElementById('outros').value);
        const autoAval = Number(document.getElementById('autoAval').value);

        // Cálculo Final (Ponderado)
        const notaFinalPercent = (mediaTestes * 0.6) + (atitudes * 0.2) + (outros * 0.2);
        const notaEscala = converterParaEscala(notaFinalPercent);

        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block';

        let mensagem = `<strong>Média Final: ${notaFinalPercent.toFixed(1)}% (Nível ${notaEscala})</strong><br>`;

        if (notaEscala === autoAval) {
            resDiv.className = 'result-box agree';
            mensagem += "O sistema concorda contigo! Estás com uma perceção perfeita do teu desempenho.";
        } else if (notaEscala > autoAval) {
            resDiv.className = 'result-box agree';
            mensagem += `O sistema é mais generoso! Estás melhor do que pensas (Nível ${notaEscala}).`;
        } else {
            resDiv.className = 'result-box disagree';
            mensagem += `O sistema discorda. Pelos cálculos, a nota aponta para Nível ${notaEscala}. Precisas de esforçar-te um pouco mais!`;
        }

        resDiv.innerHTML = mensagem;
    }

    // Inicializar
    gerarInputsTestes();
</script>

</body>
</html>
