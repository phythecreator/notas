<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Escolar | Phythecreator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --secondary: #94a3b8;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; 
        }

        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; color: var(--primary); margin: 0; }

        /* Gráficos */
        .charts-section {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;
        }
        .chart-container { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Grid Disciplinas */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px;
        }

        .card {
            background: var(--card); padding: 25px; border-radius: 20px;
            border: 1px solid var(--border); transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); }

        h3 { margin-top: 0; color: var(--primary); font-size: 1.4rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--secondary); margin-bottom: 5px; }

        input, select {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 10px; font-family: inherit; box-sizing: border-box;
        }

        .tests-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 10px; margin-top: 5px; }

        .btn-calc {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: 0.2s; margin-top: 10px;
        }
        .btn-calc:hover { background: #4f46e5; }

        .result-box {
            margin-top: 20px; padding: 15px; border-radius: 12px; background: var(--bg);
            text-align: center; display: none;
        }

        .score-big { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        .reasoning { font-size: 0.85rem; color: var(--secondary); line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dashboard de Notas</h1>
        <p>Sistema 60/20/20 • Phythecreator</p>
    </div>

    <div class="charts-section">
        <div class="chart-container"><canvas id="barChart"></canvas></div>
        <div class="chart-container"><canvas id="lineChart"></canvas></div>
    </div>

    <div id="subjects-grid" class="grid"></div>
</div>

<script>
    const disciplinas = ["História", "Português", "Geografia", "Francês", "Inglês", "Matemática", "Físico-Química", "Ciências", "Educação Física"];
    let dataNiveis = new Array(disciplinas.length).fill(0);

    function init() {
        const grid = document.getElementById('subjects-grid');
        disciplinas.forEach((d, i) => {
            grid.innerHTML += `
                <div class="card">
                    <h3>${d}</h3>
                    
                    <div class="input-group">
                        <label>Quantidade de Testes:</label>
                        <select id="num-t-${i}" onchange="updateTestInputs(${i})">
                            <option value="2">2 Testes</option>
                            <option value="3" selected>3 Testes</option>
                            <option value="4">4 Testes</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Notas dos Testes (0-100):</label>
                        <div id="tests-area-${i}" class="tests-row"></div>
                    </div>

                    <div class="input-group">
                        <label>Atitudes e Valores (0-100):</label>
                        <input type="number" id="at-${i}" placeholder="Ex: 85" min="0" max="100">
                    </div>

                    <div class="input-group">
                        <label>Trabalhos / Questão-Aula (0-100):</label>
                        <input type="number" id="tr-${i}" placeholder="Ex: 90" min="0" max="100">
                    </div>

                    <div class="input-group">
                        <label>Tua Autoavaliação (Nível 1-5):</label>
                        <input type="number" id="auto-${i}" placeholder="1 a 5" min="1" max="5">
                    </div>

                    <button class="btn-calc" onclick="calcularDisciplina(${i})">CALCULAR MÉDIA</button>

                    <div id="res-box-${i}" class="result-box">
                        <div id="score-${i}" class="score-big">0%</div>
                        <div id="nivel-${i}" style="font-weight:bold; margin-bottom:10px;">Nível -</div>
                        <div id="reason-${i}" class="reasoning"></div>
                    </div>
                </div>
            `;
            updateTestInputs(i);
        });
        updateCharts();
    }

    function updateTestInputs(index) {
        const num = document.getElementById(`num-t-${index}`).value;
        const container = document.getElementById(`tests-area-${index}`);
        container.innerHTML = "";
        for(let j=1; j<=num; j++) {
            container.innerHTML += `<input type="number" class="t-input-${index}" placeholder="T${j}" min="0" max="100">`;
        }
    }

    function calcularDisciplina(i) {
        const tests = Array.from(document.getElementsByClassName(`t-input-${i}`)).map(input => Number(input.value) || 0);
        const avgTests = tests.reduce((a, b) => a + b, 0) / tests.length;
        const atitudes = Number(document.getElementById(`at-${i}`).value) || 0;
        const trabalhos = Number(document.getElementById(`tr-${i}`).value) || 0;
        const auto = Number(document.getElementById(`auto-${i}`).value) || 0;

        // Fórmula 60/20/20
        const finalScore = (avgTests * 0.6) + (atitudes * 0.2) + (trabalhos * 0.2);
        
        let nivel = 1;
        if(finalScore >= 90) nivel = 5;
        else if(finalScore >= 70) nivel = 4;
        else if(finalScore >= 50) nivel = 3;
        else if(finalScore >= 20) nivel = 2;

        dataNiveis[i] = nivel;

        // Mostrar Resultados
        const box = document.getElementById(`res-box-${i}`);
        box.style.display = "block";
        document.getElementById(`score-${i}`).innerText = finalScore.toFixed(1) + "%";
        document.getElementById(`nivel-${i}`).innerText = "Nível " + nivel;

        // Comparação e Justificação
        const reason = document.getElementById(`reason-${i}`);
        let text = "";
        if(auto === nivel) {
            text = "O sistema concorda! A tua média de " + finalScore.toFixed(0) + " está perfeitamente alinhada com a tua perceção.";
        } else if (nivel > auto) {
            text = "O sistema é mais otimista! Estás a trabalhar para nível " + nivel + " mas avaliaste-te com " + auto + ". Estás no bom caminho!";
        } else {
            text = "O sistema sugere cautela. A tua média de " + finalScore.toFixed(0) + "% ainda te prende ao nível " + nivel + ". ";
            if(avgTests < 50) text += "Foca-te em subir as notas dos testes (valem 60%).";
        }
        reason.innerText = text;

        updateCharts();
    }

    let barChart, lineChart;
    function updateCharts() {
        const ctxBar = document.getElementById('barChart').getContext('2d');
        const ctxLine = document.getElementById('lineChart').getContext('2d');

        if(barChart) barChart.destroy();
        if(lineChart) lineChart.destroy();

        const config = (type) => ({
            type: type,
            data: {
                labels: disciplinas,
                datasets: [{
                    label: 'Nível (1-5)',
                    data: dataNiveis,
                    backgroundColor: 'rgba(99, 102, 241, 0.5)',
                    borderColor: '#6366f1',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: { y: { min: 0, max: 5, ticks: { stepSize: 1 } } },
                plugins: { legend: { display: false } }
            }
        });

        barChart = new Chart(ctxBar, config('bar'));
        lineChart = new Chart(ctxLine, config('line'));
    }

    init();
</script>

</body>
</html>
